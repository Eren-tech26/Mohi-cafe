<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  // ⚠️ REPLACE THESE VALUES with your own Firebase project config (same as customer.html)
  const firebaseConfig = {
    apiKey: "AIzaSyAtuFtR7SmfYb6QVpEeE6l3VIv6t9phxww",
    authDomain: "mohicafe-7ef3f.firebaseapp.com",
    projectId: "mohicafe-7ef3f",
    storageBucket: "mohicafe-7ef3f.firebasestorage.app",
    messagingSenderId: "160578134013",
    appId: "1:160578134013:web:ca6def754cb78a3b260394"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.firebaseLogin = async (email, password) => {
    return await signInWithEmailAndPassword(auth, email, password);
  };
  window.firebaseLogout = () => signOut(auth);

  onAuthStateChanged(auth, (user) => {
    if(user){
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('adminScreen').style.display='block';
      startOrderListener();
    } else {
      document.getElementById('loginScreen').style.display='flex';
      document.getElementById('adminScreen').style.display='none';
    }
  });

  function startOrderListener(){
    const q = query(collection(db,'orders'), orderBy('createdAt','desc'));
    onSnapshot(q, (snapshot)=>{
      const orders = [];
      snapshot.forEach(docSnap=>{
        orders.push({id:docSnap.id, ...docSnap.data()});
      });
      window.renderOrders(orders);
    });
  }

  // Update order status, stamping the relevant timestamp as it moves through the flow
  window.updateOrderStatus = async (orderId, newStatus) => {
    const updates = { status: newStatus };
    if(newStatus === 'preparing') updates.preparingAt = Date.now();
    if(newStatus === 'ready') updates.readyAt = Date.now();
    if(newStatus === 'served') updates.servedAt = Date.now();
    if(newStatus === 'cancelled') updates.cancelledAt = Date.now();
    await updateDoc(doc(db,'orders',orderId), updates);
  };

  // Cancel an order (kept in Firestore/History, just flagged)
  window.cancelOrder = async (orderId) => {
    await updateDoc(doc(db,'orders',orderId), { status:'cancelled', cancelledAt: Date.now() });
  };

  // Admin sets/updates how many minutes an order will take; also stamps preparingAt
  // so the customer-facing countdown has a start point.
  window.setEstimatedTime = async (orderId, minutes) => {
    await updateDoc(doc(db,'orders',orderId), {
      estimatedMinutes: minutes,
      preparingAt: Date.now()
    });
  };

  // Admin adds extra items to an existing order (merges into items[] + recalculates total)
  window.addItemsToOrder = async (orderId, items, total) => {
    await updateDoc(doc(db,'orders',orderId), { items, total });
  };

  // Permanently delete a single history order (served/cancelled only — never call on a live order)
  window.deleteOrder = async (orderId) => {
    await deleteDoc(doc(db,'orders',orderId));
  };

  // Permanently delete every served/cancelled order older than a given number of days.
  // Takes the already-filtered list of order objects (id + createdAt) to delete.
  window.deleteOrdersBulk = async (orderIds) => {
    for(const id of orderIds){
      await deleteDoc(doc(db,'orders',id));
    }
  };
</script>

const MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];

function populateHistoryDropdowns(){
  const yearSel=document.getElementById('histYear');
  const monthSel=document.getElementById('histMonth');
  const histOrders = allOrders.filter(o=>['served','cancelled'].includes(o.status));
  const years=[...new Set(histOrders.map(o=>new Date(o.createdAt).getFullYear()))].sort((a,b)=>b-a);
  const prevYear=yearSel.value;
  yearSel.innerHTML='<option value="all">All Years</option>'+years.map(y=>`<option value="${y}">${y}</option>`).join('');
  if(years.includes(parseInt(prevYear))) yearSel.value=prevYear;
  refreshMonthOptions();
}

function refreshMonthOptions(){
  const yearSel=document.getElementById('histYear').value;
  const monthSel=document.getElementById('histMonth');
  let histOrders = allOrders.filter(o=>['served','cancelled'].includes(o.status));
  if(yearSel!=='all') histOrders = histOrders.filter(o=>new Date(o.createdAt).getFullYear()===parseInt(yearSel));
  const months=[...new Set(histOrders.map(o=>new Date(o.createdAt).getMonth()))].sort((a,b)=>a-b);
  const prevMonth=monthSel.value;
  monthSel.innerHTML='<option value="all">All Months</option>'+months.map(m=>`<option value="${m}">${MONTH_NAMES[m]}</option>`).join('');
  if(months.includes(parseInt(prevMonth))) monthSel.value=prevMonth;
}

document.getElementById('histYear').addEventListener('change', ()=>{ refreshMonthOptions(); renderFiltered(); });
document.getElementById('histMonth').addEventListener('change', renderFiltered);

function timeAgo(ts){
  const diff = Math.floor((Date.now()-ts)/1000);
  if(diff<60) return 'just now';
  if(diff<3600) return Math.floor(diff/60)+'m ago';
  return Math.floor(diff/3600)+'h ago';
}

function remainingText(order){
  if(order.status==='preparing' && order.estimatedMinutes && order.preparingAt){
    const remainMs = order.preparingAt + order.estimatedMinutes*60000 - Date.now();
    const remainMin = Math.ceil(remainMs/60000);
    return remainMin>0 ? `~${remainMin}m left` : 'overdue';
  }
  return '';
}

window.renderOrders = function(orders){
  allOrders = orders;
  renderFiltered();
};

function getFiltered(){
  if(currentFilter==='all') return allOrders.filter(o=>!['served','cancelled'].includes(o.status||'pending'));
  if(currentFilter==='history'){
    let hist = allOrders.filter(o=>['served','cancelled'].includes(o.status));
    const yearSel = document.getElementById('histYear').value;
    const monthSel = document.getElementById('histMonth').value;
    if(yearSel!=='all') hist = hist.filter(o=>new Date(o.createdAt).getFullYear()===parseInt(yearSel));
    if(monthSel!=='all') hist = hist.filter(o=>new Date(o.createdAt).getMonth()===parseInt(monthSel));
    return hist.sort((a,b)=>b.createdAt-a.createdAt);
  }
  return allOrders.filter(o=>(o.status||'pending')===currentFilter);
}

function renderFiltered(){
  const wrap = document.getElementById('ordersWrap');
  const countEl = document.getElementById('orderCount');
  const activeCount = allOrders.filter(o=>!['served','cancelled'].includes(o.status||'pending')).length;
  const filtered = getFiltered();

  window.__ordersById = {};
  allOrders.forEach(o=>window.__ordersById[o.id]=o);

  countEl.textContent = `${activeCount} active order${activeCount!==1?'s':''} · ${filtered.length} shown`;
  document.getElementById('histCount').textContent = currentFilter==='history' ? `${filtered.length} order${filtered.length!==1?'s':''}` : '';

  if(!filtered.length){
    wrap.innerHTML = `<div class="empty-state">No orders here yet.</div>`;
    return;
  }

  function dateLabel(ts){
    const d = new Date(ts);
    const today = new Date();
    const yest = new Date(); yest.setDate(yest.getDate()-1);
    const sameDay=(a,b)=>a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
    if(sameDay(d,today)) return 'Today';
    if(sameDay(d,yest)) return 'Yesterday';
    return d.toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  }

  function orderCardHtml(order){
    const itemsHtml = (order.items||[]).map(i=>`
      <div class="order-item-row"><span>${i.qty}× ${i.name}</span><span>₹${i.qty*i.price}</span></div>
    `).join('');

    const status = order.status || 'pending';
    const remain = remainingText(order);
    const isCancelled = status==='cancelled';
    const isServed = status==='served';
    const isHistory = isCancelled || isServed;

    return `
      <div class="order-card ${isCancelled?'is-cancelled':''}">
        <div class="order-top">
          <div>
            <div class="order-table-lbl">Table</div>
            <div class="order-table">${order.tableNumber || '—'}</div>
          </div>
          <div class="order-time">
            ${order.createdAt ? timeAgo(order.createdAt) : ''}
            <div class="order-status status-${status}">${status}</div>
          </div>
        </div>
        <div class="order-name">👤 ${order.customerName || 'Guest'}</div>
        <div class="order-items">${itemsHtml}</div>
        <div class="order-total"><span>Total</span><span>₹${order.total||0}</span></div>

        ${!isHistory ? `
        <div class="status-btns">
          <button class="status-btn ${status==='pending'?'active':''}" onclick="window.updateOrderStatus('${order.id}','pending')">Pending</button>
          <button class="status-btn ${status==='preparing'?'active':''}" onclick="startPreparing('${order.id}')">Preparing</button>
          <button class="status-btn ${status==='ready'?'active':''}" onclick="window.updateOrderStatus('${order.id}','ready')">Ready</button>
          <button class="status-btn ${status==='served'?'active':''}" onclick="window.updateOrderStatus('${order.id}','served')">Served</button>
        </div>
        <div class="time-row">
          <span class="time-lbl">Prep time</span>
          <input type="number" min="1" class="time-inp" id="timeInp-${order.id}" value="${order.estimatedMinutes||15}">
          <button class="time-save-btn" onclick="saveEstimatedTime('${order.id}')">Save</button>
          ${remain ? `<span class="time-remain">${remain}</span>` : ''}
        </div>
        <div class="action-row">
          <button class="action-btn" onclick="openAddItemsModal('${order.id}')">+ Add Items</button>
          <button class="action-btn" onclick="printOrder('${order.id}')">🖨 Print</button>
          <button class="action-btn cancel-btn" onclick="confirmCancel('${order.id}')">Cancel</button>
        </div>
        ` : `
        <div class="action-row">
          <button class="action-btn" onclick="printOrder('${order.id}')">🖨 Print</button>
          <button class="del-order-btn" onclick="confirmDeleteSingle('${order.id}')">🗑 Delete</button>
        </div>
        `}
      </div>`;
  }

  if(currentFilter==='history'){
    // Group by date, newest first, with a header before each new day
    let html='';
    let lastLabel=null;
    filtered.forEach(order=>{
      const label = dateLabel(order.createdAt);
      if(label!==lastLabel){
        html += `<div class="date-group-hd">${label}</div>`;
        lastLabel = label;
      }
      html += orderCardHtml(order);
    });
    wrap.innerHTML = html;
  } else {
    wrap.innerHTML = filtered.map(orderCardHtml).join('');
  }
}

function saveEstimatedTime(orderId){

}

// One-tap "Preparing": sets status AND starts the reverse timer using whatever
// minutes are currently in the box (defaults to 15 if untouched).
async function startPreparing(orderId){
  const inp = document.getElementById('timeInp-'+orderId);
  const minutes = (inp && parseInt(inp.value,10)) || 15;
  await window.updateOrderStatus(orderId, 'preparing');
  await window.setEstimatedTime(orderId, minutes); // stamps preparingAt = now, starts countdown
}

}

/* ── DELETE HISTORY (single + bulk by date range) ── */
let pendingDeleteMode = null; // 'single' | 'bulk'
let pendingDeleteOrderId = null;

function openConfirmModal(mode){
  pendingDeleteMode = mode;
  const title = document.getElementById('confirmTitle');
  const body = document.getElementById('confirmBody');
  const rangeSelect = document.getElementById('rangeSelect');
  const inp = document.getElementById('confirmInp');
  const delBtn = document.getElementById('confirmDeleteBtn');

  inp.value='';
  delBtn.classList.remove('ready');

  if(mode==='single'){
    title.textContent = 'Delete this order?';
    body.textContent = 'This permanently deletes this order from history. This cannot be undone.';
    rangeSelect.style.display = 'none';
  } else {
    title.textContent = 'Clear old history?';
    body.textContent = 'This permanently deletes matching orders from history. This cannot be undone.';
    rangeSelect.style.display = 'block';
  }

  document.getElementById('confirmOverlay').classList.add('open');
  inp.focus();
}

function closeConfirmModal(){
  document.getElementById('confirmOverlay').classList.remove('open');
  pendingDeleteMode = null;
  pendingDeleteOrderId = null;
}

function confirmDeleteSingle(orderId){
  pendingDeleteOrderId = orderId;
  openConfirmModal('single');
}

document.getElementById('clearHistBtn').addEventListener('click', ()=>openConfirmModal('bulk'));
document.getElementById('confirmCancelBtn').addEventListener('click', closeConfirmModal);
document.getElementById('confirmOverlay').addEventListener('click', (e)=>{
  if(e.target.id==='confirmOverlay') closeConfirmModal();
});

document.getElementById('confirmInp').addEventListener('input', (e)=>{
  const delBtn = document.getElementById('confirmDeleteBtn');
  if(e.target.value.trim().toUpperCase()==='DELETE') delBtn.classList.add('ready');
  else delBtn.classList.remove('ready');
});

document.getElementById('confirmDeleteBtn').addEventListener('click', async ()=>{
  const inp = document.getElementById('confirmInp');
  if(inp.value.trim().toUpperCase()!=='DELETE') return; // guard against Enter-key bypass

  const delBtn = document.getElementById('confirmDeleteBtn');
  delBtn.disabled = true;
  delBtn.textContent = 'Deleting…';

  try{
    if(pendingDeleteMode==='single'){
      await window.deleteOrder(pendingDeleteOrderId);
    } else {
      const days = parseInt(document.getElementById('rangeSelect').value,10);
      const cutoff = days===0 ? Infinity : Date.now() - days*86400000;
      const toDelete = allOrders.filter(o=>
        ['served','cancelled'].includes(o.status) &&
        (days===0 || o.createdAt < cutoff)
      ).map(o=>o.id);
      await window.deleteOrdersBulk(toDelete);
    }
  } catch(err){
    console.error(err);
    alert('Something went wrong deleting. Please try again.');
  }

  delBtn.disabled = false;
  delBtn.textContent = 'Delete';
  closeConfirmModal();
});

let modalOrderId = null;
let modalExtra = {};

function openAddItemsModal(orderId){

  document.getElementById('modalTableNum').textContent = order ? (order.tableNumber||'—') : '—';

}
document.getElementById('modalCloseBtn').addEventListener('click', closeAddItemsModal);
document.getElementById('addItemsModal').addEventListener('click', (e)=>{
  if(e.target.id==='addItemsModal') closeAddItemsModal();
});

function renderModalList(q){
  const list = document.getElementById('modalList');
  const filtered = ADMIN_MENU.filter(i=>i.n.toLowerCase().includes(q.toLowerCase()));
  list.innerHTML = filtered.map(item=>{
    const qty = modalExtra[item.id]||0;
    return `<div class="modal-item">
      <div>
        <div class="modal-item-name">${item.n}</div>
        <div class="modal-item-price">₹${item.p}</div>
      </div>
      <div class="modal-item-ctrl" data-id="${item.id}">
        ${qty===0
          ? `<button class="madd-btn">Add</button>`
          : `<div class="mqctrl"><button class="mqbtn mminus">−</button><span class="mqnum">${qty}</span><button class="mqbtn mplus">+</button></div>`}
      </div>
    </div>`;
  }).join('');

  list.querySelectorAll('.modal-item-ctrl').forEach(el=>{
    const id = el.dataset.id;
    const addBtn = el.querySelector('.madd-btn');
    const minus = el.querySelector('.mminus');
    const plus = el.querySelector('.mplus');
    if(addBtn) addBtn.addEventListener('click', ()=>{ modalExtra[id]=1; renderModalList(document.getElementById('modalSearch').value); });
    if(minus) minus.addEventListener('click', ()=>{ modalExtra[id]--; if(modalExtra[id]<=0) delete modalExtra[id]; renderModalList(document.getElementById('modalSearch').value); });
    if(plus) plus.addEventListener('click', ()=>{ modalExtra[id]++; renderModalList(document.getElementById('modalSearch').value); });
  });
  updateModalTotal();
}

function updateModalTotal(){
  const total = Object.entries(modalExtra).reduce((s,[id,q])=>{
    const item = ADMIN_MENU.find(m=>m.id==id);
    return s + (item ? q*item.p : 0);
  }, 0);
  document.getElementById('modalTotal').textContent = `₹${total} selected`;
}

document.getElementById('modalSearch').addEventListener('input', e=>renderModalList(e.target.value));

document.getElementById('modalAddBtn').addEventListener('click', async ()=>{
  if(!Object.keys(modalExtra).length){ closeAddItemsModal(); return; }
  const order = window.__ordersById[modalOrderId];
  if(!order){ closeAddItemsModal(); return; }
  const items = (order.items||[]).map(i=>({...i}));
  Object.entries(modalExtra).forEach(([id,qty])=>{
    const menuItem = ADMIN_MENU.find(m=>m.id==id);
    if(!menuItem) return;
    const existing = items.find(i=>i.name===menuItem.n);
    if(existing) existing.qty += qty;
    else items.push({name:menuItem.n, price:menuItem.p, qty});
  });
  const newTotal = items.reduce((s,i)=>s+i.qty*i.price,0);
  await window.addItemsToOrder(modalOrderId, items, newTotal);
  closeAddItemsModal();
});
</script>
</body>
